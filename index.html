<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F0F1F3;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:32px}
.wrap{max-width:1100px;width:100%;background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 20px rgba(21,25,45,0.07)}
.hdr{background:#15192D;padding:24px 36px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.hdr p{font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px}
.hdr-r{font-size:12px;font-weight:700;color:#1A61D9;letter-spacing:1.5px;text-transform:uppercase}
.badge{display:inline-block;font-size:9px;font-weight:700;color:#15192D;background:#F1C40F;padding:2px 7px;border-radius:4px;letter-spacing:.5px;margin-left:8px;vertical-align:middle}
.map-area{padding:24px 36px 8px;position:relative}
#tooltip{position:absolute;background:#15192D;color:#fff;padding:10px 16px;border-radius:6px;font-size:11.5px;font-weight:500;pointer-events:none;opacity:0;transition:opacity .12s;z-index:10;white-space:nowrap;box-shadow:0 6px 18px rgba(0,0,0,.18);line-height:1.5}
#tooltip strong{color:#7EB5F5}
.state-path{stroke:#fff;stroke-width:.8;cursor:pointer;transition:opacity .15s}
.state-path:hover{opacity:.82;stroke-width:1.5}
.leg{padding:18px 28px 24px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;border-top:1px solid #ECEDF0}
.card{display:flex;flex-direction:column;gap:1px;padding:11px 15px;border-radius:9px;background:#F7F8FA;min-width:148px}
.card-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.card-h .ld{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.card-h .region{font-size:11.5px;font-weight:700;color:#2D3654}
.roster{font-size:10.5px;color:#5A6478;line-height:1.65}
.roster .nm{font-weight:600;color:#2D3654}
.roster .role{color:#A8AEBC;font-weight:500;margin-left:3px}
.note{font-size:9.5px;color:#1A61D9;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.footnote{text-align:center;padding:0 36px 20px;font-size:10px;color:#AAA;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1>Territory Assignments</h1><p>Landing Autopilot Sales — Pod Coverage, June 2026</p></div>
    <div class="hdr-r">Landing</div>
  </div>
  <div class="map-area" id="mapArea">
    <div id="tooltip"></div>
    <svg id="map" viewBox="0 0 960 620"></svg>
  </div>
  <div class="leg" id="leg"></div>
  <div class="footnote">
    Diagonal stripes indicate shared coverage between two pods.<br>
    TX: Wells/Cam (North / Dallas) &amp; G/Raegan (South).
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const FIPS={"01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL","18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD","25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD","47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV","55":"WI","56":"WY","72":"PR"};

const podColors={
  "Jack / Brady":"#1A61D9",
  "Wells / Cam":"#156082",
  "Scout / Renato":"#E67E22",
  "X / Richard":"#27AE60",
  "G / Raegan":"#7D3C98",
  "Jack H / Nolan":"#9AA3B2"
};

const stateAssignments={
  "AK":"X / Richard","HI":"X / Richard",
  "AL":"Scout / Renato","AZ":"X / Richard","AR":"Wells / Cam",
  "CA":"X / Richard","CO":"X / Richard","CT":"G / Raegan","DE":"G / Raegan",
  "DC":"G / Raegan","FL":"Scout / Renato","GA":"Scout / Renato",
  "ID":"X / Richard","IL":"Jack / Brady","IN":"Jack / Brady","IA":"Jack / Brady",
  "KS":"Wells / Cam","KY":"Jack / Brady","LA":"Jack / Brady","ME":"G / Raegan",
  "MD":"G / Raegan","MA":"G / Raegan","MI":"Jack / Brady","MN":"Jack / Brady",
  "MS":"Jack / Brady","MO":"Wells / Cam","MT":"X / Richard","NE":"Jack / Brady",
  "NV":"X / Richard","NH":"G / Raegan","NJ":"G / Raegan","NM":"Wells / Cam",
  "NY":"G / Raegan","ND":"Jack / Brady","OH":"Jack / Brady","OK":"Wells / Cam",
  "OR":"X / Richard","PA":"G / Raegan","RI":"G / Raegan","SD":"Jack / Brady",
  "TN":"Jack / Brady","UT":"X / Richard","VT":"G / Raegan","WA":"X / Richard",
  "WV":"Jack / Brady","WI":"Jack / Brady","WY":"X / Richard",
  "VA":"Jack / Brady","NC":"Jack / Brady","SC":"Jack / Brady"
};

const splitStates={
  "TX":{
    tooltip:"<strong>TX</strong><br>Wells / Cam — North TX (Dallas)<br>G / Raegan — South TX"
  }
};

function getColor(abbr){
  if(splitStates[abbr])return null; // handled by pattern
  const pod=stateAssignments[abbr];
  return pod?podColors[pod]:"#DDD";
}

function getTooltip(abbr){
  if(splitStates[abbr])return splitStates[abbr].tooltip;
  const pod=stateAssignments[abbr];
  return pod?`<strong>${abbr}</strong> — ${pod}`:`<strong>${abbr}</strong> — Unassigned`;
}

const svg=d3.select("#map");
const tooltip=document.getElementById("tooltip");
const mapArea=document.getElementById("mapArea");
const path=d3.geoPath().projection(d3.geoAlbersUsa().scale(1200).translate([480,300]));

// Stripe pattern for shared TX: Wells/Cam (teal) + G/Raegan (purple)
const defs=svg.append("defs");
const txPat=defs.append("pattern").attr("id","pat-TX").attr("patternUnits","userSpaceOnUse").attr("width",8).attr("height",8).attr("patternTransform","rotate(45)");
txPat.append("rect").attr("width",8).attr("height",8).attr("fill","#156082");
txPat.append("rect").attr("width",4).attr("height",8).attr("fill","#7D3C98");

d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us=>{
  const states=topojson.feature(us,us.objects.states).features;

  svg.selectAll("path.state-path").data(states).enter().append("path")
    .attr("d",path).attr("class","state-path")
    .attr("fill",d=>{
      const a=FIPS[d.id];
      if(a==="TX")return"url(#pat-TX)";
      return getColor(a)||"#DDD";
    })
    .on("mousemove",function(event,d){
      const a=FIPS[d.id];
      tooltip.innerHTML=getTooltip(a);
      tooltip.style.opacity=1;
      const rect=mapArea.getBoundingClientRect();
      tooltip.style.left=(event.clientX-rect.left+14)+"px";
      tooltip.style.top=(event.clientY-rect.top-40)+"px";
    })
    .on("mouseleave",()=>{tooltip.style.opacity=0;});

  // State borders
  svg.append("path")
    .datum(topojson.mesh(us,us.objects.states,(a,b)=>a!==b))
    .attr("fill","none").attr("stroke","#fff").attr("stroke-width",.7).attr("d",path);

  // State labels
  const smallSt=new Set(["NH","VT","MA","RI","CT","NJ","DE","MD","DC"]);
  const offsets={"FL":[12,8],"LA":[0,6],"MI":[12,-8],"HI":[-20,12],"ID":[0,4],"CA":[-4,0]};
  const centroids={};
  states.forEach(d=>{const a=FIPS[d.id];if(a&&a!=="PR"){const c=path.centroid(d);if(c[0]&&c[1])centroids[a]=c;}});

  let calloutY=130;
  Object.entries(centroids).forEach(([abbr,c])=>{
    const off=offsets[abbr]||[0,0];
    if(smallSt.has(abbr)){
      const tx=912;const ty=calloutY;calloutY+=16;
      svg.append("line").attr("x1",c[0]).attr("y1",c[1]).attr("x2",tx-4).attr("y2",ty)
        .attr("stroke","#BBB").attr("stroke-width",.4);
      svg.append("circle").attr("cx",c[0]).attr("cy",c[1]).attr("r",1.8)
        .attr("fill",getColor(abbr)||"#DDD").attr("stroke","#fff").attr("stroke-width",.5);
      svg.append("text").attr("x",tx).attr("y",ty+3)
        .attr("font-family","DM Sans,sans-serif").attr("font-size","8px").attr("font-weight","600")
        .attr("fill","#555").attr("text-anchor","start").text(abbr);
    } else {
      const unassigned=abbr!=="TX"&&!stateAssignments[abbr];
      svg.append("text").attr("x",c[0]+off[0]).attr("y",c[1]+off[1]+3)
        .attr("font-family","DM Sans,sans-serif").attr("font-size","9px").attr("font-weight","600")
        .attr("fill",unassigned?"#15192D":"#fff")
        .attr("text-anchor","middle")
        .style("pointer-events","none")
        .style("text-shadow",unassigned?"none":"0 1px 2px rgba(0,0,0,.35)")
        .text(abbr);
    }
  });
});

// Legend — roster cards (AE / BDR I / BDR II per pod)
const leg=document.getElementById("leg");
const pods=[
  {color:"#1A61D9",region:"Central + Carolinas/VA",ae:"Jack",bdr1:"Brady",bdr2:"Dan"},
  {color:"#156082",region:"N. TX, NM, OK, KS, MO, AR",ae:"Wells",bdr1:"Cam",bdr2:"Chandler"},
  {color:"#E67E22",region:"AL, GA, FL",ae:"Scout",bdr1:"Renato",bdr2:"Jaycie"},
  {color:"#27AE60",region:"West of Rockies + AK/HI",ae:"X",bdr1:"Richard",bdr2:"Blake"},
  {color:"#7D3C98",region:"S. TX + Northeast",ae:"G",bdr1:"Raegan",bdr2:"Jennie"},
  {color:"#9AA3B2",region:"Top NMHC — national",ae:"Jack H",bdr1:"Nolan",note:"Focus: Top NMHC owners"}
];

pods.forEach(p=>{
  const card=document.createElement("div");card.className="card";
  let roster=`<div class="roster"><span class="nm">${p.ae}</span><span class="role">AE</span></div>`;
  if(p.bdr1)roster+=`<div class="roster"><span class="nm">${p.bdr1}</span><span class="role">BDR I</span></div>`;
  if(p.bdr2)roster+=`<div class="roster"><span class="nm">${p.bdr2}</span><span class="role">BDR II</span></div>`;
  card.innerHTML=`<div class="card-h"><div class="ld" style="background:${p.color}"></div><span class="region">${p.region}</span></div>${roster}${p.note?`<div class="note">${p.note}</div>`:""}`;
  leg.appendChild(card);
});
</script>
</body>
</html>
