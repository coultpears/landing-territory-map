# Access is gated by Netlify's native site password protection (configured in
# Netlify: Site config → Access & security → Visitor access). No edge function.
#
# Serverless functions (territory config read/write, backed by Netlify Blobs).
# The territory function routes itself to /api/territory via its v2 path config.
# Writes require the ADMIN_PASSWORD site env var.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
