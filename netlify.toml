# Password gate for the territory map. The edge function checks the MAP_PASSWORD
# site env var (set in Netlify, not stored here). Deploying this repo requires
# Deno installed locally for the CLI to bundle the edge function.
[[edge_functions]]
  path = "/*"
  function = "auth"

# Serverless functions (territory config read/write, backed by Netlify Blobs).
# The territory function routes itself to /api/territory via its v2 path config.
# Writes require the ADMIN_PASSWORD site env var.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
